<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>NGVU Simulation</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="author" content="Shaun James - Cortical Analysis Lab" />
  <meta name="creator" content="Shaun James" />
  <meta name="publisher" content="Cortical Analysis Lab" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='16' fill='%2311141b'/%3E%3Cpath d='M6 17h5l2-5 4 10 3-7h6' fill='none' stroke='%23ffcf78' stroke-width='2.2' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E" />

  <!-- p5.js (LOAD ONCE) -->
  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.min.js"></script>

  <link rel="stylesheet" href="css/style.css" />
</head>

<body>

<!-- =====================================================
     EDGE TABS — ALWAYS VISIBLE CONTROLS
===================================================== -->

<div class="edge-tab instructions"
     onclick="togglePanel('instructions')">
  Instructions
</div>

<!-- =====================================================
     INSTRUCTIONS PANEL (LEFT)
===================================================== -->
<div id="instructions" class="panel left">
  <div class="panel-content" id="instructions-content"></div>
</div>

<!-- =====================================================
     EVENT LOG
===================================================== -->
<div id="event-log" aria-live="polite"></div>

<button id="fireApBtn" class="touch-fire-btn" onclick="triggerTouchFireAP()">
  Fire AP
</button>

<!-- =====================================================
     TOP UI BAR
===================================================== -->
<div id="top-controls">
  <div id="ui">
    <div class="sim-title-row">
      <h1 class="sim-title">NGVU Simulation</h1>
      <span class="sim-credit">Created by Shaun James — Cortical Analysis Lab</span>
      <button
        id="mobileBannerToggle"
        class="mobile-banner-toggle"
        type="button"
        onclick="toggleMobileBanner()"
        aria-expanded="true"
        aria-controls="top-controls"
      >
        Hide
      </button>
    </div>

    <div class="buttons">
      <button onclick="setMode('cortical')">Cortical Column</button>
      <button onclick="setMode('overview')">Neuron</button>
      <button onclick="setMode('synapse')">Synapse</button>
      <button id="pauseBtn">Pause</button>

      <label class="toggle" id="myelinToggleContainer">
        <input type="checkbox" id="myelinToggle" />
        <span>Myelin</span>
      </label>

      <label class="toggle" id="clearanceToggleContainer">
        <input type="checkbox" id="clearanceToggle" checked />
        <span>Clearance</span>
      </label>

      <label class="toggle" id="tutorialToggleContainer">
        <input type="checkbox" id="tutorialToggle" />
        <span>Guided Tutorial</span>
      </label>

      <details id="blockablesContainer" class="blockables-dropdown">
        <summary>Blockables</summary>
        <div class="blockables-menu">
          <label class="toggle" id="ampaBlockToggleContainer">
            <input type="checkbox" id="ampaBlockToggle" />
            <span>AMPA</span>
          </label>

          <label class="toggle" id="reuptakeBlockToggleContainer">
            <input type="checkbox" id="reuptakeBlockToggle" />
            <span>Reuptake</span>
          </label>

          <label class="toggle" id="sodiumBlockToggleContainer">
            <input type="checkbox" id="sodiumBlockToggle" />
            <span>Na+</span>
          </label>

          <label class="toggle" id="calciumBlockToggleContainer">
            <input type="checkbox" id="calciumBlockToggle" />
            <span>Ca2+</span>
          </label>

          <label class="toggle" id="snareBlockToggleContainer">
            <input type="checkbox" id="snareBlockToggle" />
            <span>SNARE</span>
          </label>
        </div>
      </details>

      <label class="toggle" id="bbbDebugToggleContainer">
        <input type="checkbox" id="bbbDebugToggle" />
        <span>BBB Guides</span>
      </label>
    </div>
  </div>

  <div id="plasticity-dock">
    <button id="ltpLtdBtn" class="plasticity-btn" title="Run automatic LTP/LTD demo">
      <span class="ltp-token">LTP</span>/<span class="ltd-token">LTD</span>
    </button>
  </div>
</div>


<script src="app.min.js"></script>
</body>
</html>
